pipeline:
  name: demo-pipeline
  identifier: demopipeline
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  variables:
    - name: PROJECT_NAME
      type: String
      description: The project name
      required: true
      value: <+input>.default(lhs-demo)
  stages:
    - stage:
        name: CI
        identifier: CI
        description: ""
        type: CI
        spec:
          cloneCodebase: false
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Docker
            spec:
              harnessImageConnectorRef: account.harnessImage
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: hostname <+pipeline.variables.PROJECT_NAME>
                  description: test
                  when:
                    stageStatus: All
        delegateSelectors:
          - helm-delegate
    - stage:
        name: Test-Approval
        identifier: TestApproval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: test
                  identifier: test
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the result and get approval to go ahead
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
              - step:
                  type: ShellScript
                  name: run-after-approval
                  identifier: runafterapproval
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: echo "after approval for version 1.0.1"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
